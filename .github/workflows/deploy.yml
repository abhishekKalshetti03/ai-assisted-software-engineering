name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -t url-shortener:latest .

      - name: Smoke test container image
        run: |
          docker run -d --name url-shortener-smoke -p 3000:3000 url-shortener:latest
          sleep 10
          curl -f http://localhost:3000/health
          docker rm -f url-shortener-smoke

      - name: Deploy placeholder
        run: |
          echo "This workflow is ready to be connected to a cloud provider such as Azure, AWS, or GCP."
          echo "Add your deployment credentials and target cluster or app service here."
