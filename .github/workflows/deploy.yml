name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -t url-shortener:latest .

      - name: Smoke test container image
        run: |
          trap 'docker rm -f url-shortener-smoke >/dev/null 2>&1 || true' EXIT
          docker run -d --name url-shortener-smoke -e BASE_URL=http://localhost:3000 -p 3000:3000 url-shortener:latest
          for attempt in {1..30}; do
            if curl -fsS http://localhost:3000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs url-shortener-smoke
          exit 1

      - name: Deploy placeholder
        run: |
          echo "This workflow is ready to be connected to a cloud provider such as Azure, AWS, or GCP."
          echo "Add your deployment credentials and target cluster or app service here."
