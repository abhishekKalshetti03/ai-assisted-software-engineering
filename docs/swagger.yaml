openapi: 3.0.3
info:
  title: URL Shortener API
  version: 1.0.0
  description: API for creating short URLs, redirecting them, and retrieving analytics.
paths:
  /shorten:
    post:
      summary: Create a short URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  example: https://www.google.com
      responses:
        '201':
          description: Short URL created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: abc123
                  shortUrl:
                    type: string
                    example: http://localhost:3000/abc123
        '400':
          description: Invalid URL provided
  /{id}:
    get:
      summary: Redirect to the original URL
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to original URL
        '404':
          description: Short URL not found
  /analytics/{id}:
    get:
      summary: Get click analytics for a short URL
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analytics returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  clicks:
                    type: integer
                    example: 5
        '404':
          description: Short URL not found
