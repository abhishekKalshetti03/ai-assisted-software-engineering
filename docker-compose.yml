version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: url-shortener:local
    container_name: url-shortener
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
